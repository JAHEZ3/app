{{- if .Values.nats.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: {{ .Values.namespace }}
  labels:
    app: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: {{ .Values.nats.image }}
          args: ["-js"]
          ports:
            - containerPort: {{ .Values.nats.port }}
              name: client
            - containerPort: 8222
              name: monitor
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: nats
  ports:
    - name: client
      port: {{ .Values.nats.port }}
      targetPort: {{ .Values.nats.port }}
{{- end }}
