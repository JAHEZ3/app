{{- $root := . -}}
{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $root.Values.namespace }}
  labels:
    app: {{ $name }}
spec:
  replicas: {{ $root.Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      serviceAccountName: {{ $root.Values.serviceAccount.name }}
      containers:
        - name: {{ $name }}
          image: "{{ $root.Values.image.registry }}/{{ $root.Values.image.repoPrefix }}/{{ $name }}:{{ $root.Values.image.tag }}"
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          # Runtime env (DB, Redis, NATS, JWT...) from the synced Secret.
          envFrom:
            - secretRef:
                name: {{ $root.Values.envSecretName }}
          env:
            - name: PORT
              value: "{{ $svc.port }}"
            - name: SERVICE_NAME
              value: {{ $name }}
          resources:
            {{- toYaml $root.Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $root.Values.namespace }}
spec:
  selector:
    app: {{ $name }}
  ports:
    - port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
  type: ClusterIP
{{- end }}
