name: Deploy Platform

# Builds Docker images for the NestJS microservices AND the Next.js web apps,
# pushes them to ECR, and deploys everything to EKS via Helm.
on:
  push:
    branches: [main]
    paths:
      - "servers/**"
      - "client/**"
      - "dashboard/**"
      - "paneldashboard/**"
      - "infra/k8s/**"
      - ".github/workflows/deploy-services.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: eu-north-1
  CLUSTER_NAME: jahez-dev-eks
  ECR_REGISTRY: 220719767281.dkr.ecr.eu-north-1.amazonaws.com
  REPO_PREFIX: jahez

jobs:
  # ─── Build & push one image per service (in parallel) ──────────────────────
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - order-service
          - delivery-service
          - restaurant-service
          - customer-service
          - manager-service
          - notification-service
          - payment-service
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        working-directory: servers
        run: |
          IMAGE=$ECR_REGISTRY/$REPO_PREFIX/${{ matrix.service }}
          docker build \
            --build-arg SERVICE_NAME=${{ matrix.service }} \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            -f Dockerfile .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  # ─── Build & push one image per Next.js web app (in parallel) ──────────────
  build-web:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [client, dashboard, paneldashboard]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push web image
        working-directory: ${{ matrix.app }}
        run: |
          IMAGE=$ECR_REGISTRY/$REPO_PREFIX/web-${{ matrix.app }}
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest -f Dockerfile .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  # ─── Deploy everything to EKS ──────────────────────────────────────────────
  deploy:
    needs: [build, build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME

      - name: Sync runtime secret (Secrets Manager -> Kubernetes)
        run: |
          kubectl create namespace jahez --dry-run=client -o yaml | kubectl apply -f -
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id jahez-dev/app --query SecretString --output text)
          # Build kubectl args: one --from-literal per key in the JSON.
          ARGS=$(echo "$SECRET_JSON" | jq -r 'to_entries|map("--from-literal="+.key+"="+(.value|tostring))|.[]')
          kubectl create secret generic jahez-app-secrets -n jahez \
            $ARGS --dry-run=client -o yaml | kubectl apply -f -

      - name: Resolve app IRSA role ARN
        id: tf
        run: |
          ROLE_ARN=$(aws iam get-role --role-name jahez-dev-app --query 'Role.Arn' --output text)
          echo "role_arn=$ROLE_ARN" >> $GITHUB_OUTPUT

      - name: Helm deploy
        run: |
          helm upgrade --install jahez infra/k8s/jahez \
            --namespace jahez --create-namespace \
            --set image.registry=$ECR_REGISTRY \
            --set image.repoPrefix=$REPO_PREFIX \
            --set image.tag=${{ github.sha }} \
            --set serviceAccount.roleArn=${{ steps.tf.outputs.role_arn }} \
            --wait --timeout 8m
